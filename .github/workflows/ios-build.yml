name: Build & Upload RuneXO iOS to App Store

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract iOS build package
        run: |
          tar -xzf runexo-ios-build.tar.gz
          mv ios-build runexo-cap

      - name: Install Capacitor dependencies
        working-directory: runexo-cap
        run: npm install

      - name: Add iOS platform
        working-directory: runexo-cap
        run: npx cap add ios

      - name: Sync web files
        working-directory: runexo-cap
        run: npx cap sync ios

      - name: Patch Podfile for code signing
        working-directory: runexo-cap/ios/App
        run: python3 -c "open('Podfile','a').write('\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings[\"CODE_SIGNING_ALLOWED\"] = \"NO\"\n      config.build_settings[\"CODE_SIGNING_REQUIRED\"] = \"NO\"\n    end\n  end\nend\n')"

      - name: Install CocoaPods
        working-directory: runexo-cap/ios/App
        run: pod install

      - name: Import Distribution Certificate
        run: |
          echo "${{ secrets.DISTRIBUTION_CERTIFICATE_PEM }}" > dist.pem
          echo "${{ secrets.DISTRIBUTION_KEY }}" > dist.key
          openssl pkcs12 -export -out distribution.p12 -inkey dist.key -in dist.pem -passout pass:build123
          echo "P12 file size: $(wc -c < distribution.p12) bytes"
          security create-keychain -p "temp_password" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "temp_password" build.keychain
          security import distribution.p12 -k build.keychain -P "build123" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "temp_password" build.keychain
          security list-keychain -d user -s build.keychain

      - name: Install Provisioning Profile
        run: |
          echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(security cms -D -i profile.mobileprovision | plutil -extract UUID raw -)
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${UUID}.mobileprovision
          echo "PROFILE_UUID=${UUID}" >> $GITHUB_ENV

      - name: Setup App Store Connect API Key
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APP_STORE_API_PRIVATE_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY_ID }}.p8

      - name: Build & Archive
        working-directory: runexo-cap/ios/App
        run: |
          xcodebuild archive \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/RuneXO.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${{ env.PROFILE_UUID }}" \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }}

      - name: Export IPA
        run: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.runexo.game</key>
              <string>RuneXO AppStore</string>
            </dict>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/RuneXO.xcarchive \
            -exportPath $RUNNER_TEMP/RuneXO-IPA \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APP_STORE_API_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APP_STORE_API_ISSUER_ID }}

      - name: Upload to App Store Connect
        run: |
          xcrun altool --upload-app \
            --type ios \
            --file "$RUNNER_TEMP/RuneXO-IPA/App.ipa" \
            --apiKey ${{ secrets.APP_STORE_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_API_ISSUER_ID }} \
            --apiKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APP_STORE_API_KEY_ID }}.p8

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: RuneXO-IPA
          path: ${{ runner.temp }}/RuneXO-IPA/*.ipa
